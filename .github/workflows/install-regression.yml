name: Install Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  install-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run install regression tests
        run: |
          chmod +x scripts/tests/test-install-regression.sh
          scripts/tests/test-install-regression.sh
